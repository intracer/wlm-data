# Only show warnings from Spark logging
status=warn

rootLogger.level=warn
rootLogger.appenderRef.console.ref=console

appender.console.type=Console
appender.console.name=console
appender.console.target=SYSTEM_ERR
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{yyyy-MM-dd HH:mm:ss} %p %c{1}: %m%n%ex

# Suppress native Hadoop library warning, Java fallback is fine
logger.nativeCodeLoader.name=org.apache.hadoop.util.NativeCodeLoader
logger.nativeCodeLoader.level=error

logger.hdfs_state.name = org.apache.spark.sql.execution.streaming.state.HDFSBackedStateStoreProvider
logger.hdfs_state.level = error